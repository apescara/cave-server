services:
  jellyfin:
    image: 'jellyfin/jellyfin:10.10'
    restart: 'unless-stopped'
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - JELLYFIN_PublishedServerUrl=https://jellyfin.dacave.org/
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    volumes:
      - './cache:/cache'
      - './config:/config'
      - './logs:/logs'
      - /mnt/seagate4t:/seagate4t
      - /mnt/lake1t:/lake1t
    extra_hosts:
      - 'host.docker.internal:host-gateway'