services:
  radarr:
    image: ghcr.io/hotio/radarr
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=002
    ports:
      - 7878:7878
    volumes:
      - ./config:/config
      - /mnt/lake1t/downloads:/downloads
      - /mnt/lake1t/movies:/movies
      - /mnt/seagate4t/anime:/anime
      